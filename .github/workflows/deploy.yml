name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NDV_API_KEY: ${{ secrets.NDV_API_KEY }}

jobs:
  build:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: ./mvnw clean package
        working-directory: backend

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/nightcore.jar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Upload frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: frontend/

  static-analysis:
    name: "SAST: PMD + SpotBugs"
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run static analysis
        run: ./mvnw clean verify -DskipTests
        working-directory: backend
        continue-on-error: true

      - name: Generate SpotBugs HTML report
        if: always()
        run: |
          SPOTBUGS_JAR=$(find ~/.m2/repository/com/github/spotbugs/spotbugs/ -name "spotbugs-*.jar" | head -1)
          if [ -n "$SPOTBUGS_JAR" ]; then
            java -cp "$SPOTBUGS_JAR" \
              edu.umd.cs.findbugs.LaunchAppropriateUI \
              -quiet -html \
              -output target/spotbugs-report.html \
              target/spotbugsXml.xml || true
          fi
        working-directory: backend

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-pmd-report
          path: |
            backend/target/pmd.xml
            backend/target/reports/pmd.html

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-spotbugs-report
          path: |
            backend/target/spotbugsXml.xml
            backend/target/site/spotbugs.html

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-jacoco-coverage
          path: backend/target/site/jacoco/

  dependency-check:
    name: "SCA: OWASP DC"
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP DC database
        id: cache-dc
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dc-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            dc-${{ runner.os }}-

      - name: OWASP Dependency Check
        run: |
          if [ -n "$NDV_API_KEY" ]; then
            ./mvnw org.owasp:dependency-check-maven:check \
              -DskipTests \
              -DfailBuildOnCVSS=7 \
              -DnvdApiKey="$NDV_API_KEY"
          else
            echo "NDV_API_KEY not set"
            exit 1
          fi
        working-directory: backend
        env:
          NDV_API_KEY: ${{ secrets.NDV_API_KEY }}

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-owasp-dc-report
          path: |
            backend/target/dependency-check-report.html
            backend/target/dependency-check-report.json

  dast:
    name: "DAST: OWASP ZAP"
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install system deps for app
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg soundstretch lame

      - name: Start backend
        run: |
          java -jar nightcore.jar \
            --server.port=8123 &
          sleep 5
          for i in $(seq 1 15); do
            curl -s http://localhost:8123 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8123'
          cmd_options: '-a'
          issue_title: 'Nightcore DAST Report'
          allow_issue_writing: false
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-report
          path: ./zap-report/

      - name: Stop backend
        if: always()
        run: pkill -f "nightcore.jar" || true

  deploy:
    name: Deploy
    needs: [build, static-analysis, dependency-check, dast]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar

      - uses: actions/download-artifact@v4
        with:
          name: frontend-static
          path: frontend

      - name: Deploy placeholder
        run: echo "заглушенька))"
