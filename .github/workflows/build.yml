name: Build Check

on:
  push:
    branches-ignore: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Backend build
        run: ./mvnw clean verify -Dmaven.tests.skip=true
        working-directory: backend

      - name: Frontend deps
        run: npm ci
        working-directory: frontend
